name: 🚀 EAS update

env:
  EXPO_PUBLIC_BASE_URL: ${{ vars.API_URL }}
  EXPO_PUBLIC_AUTH_URL: ${{ vars.AUTH_URL }}
  EXPO_PUBLIC_OPENAPI_URL: ${{ vars.OPENAPI_URL }}

on:
  workflow_dispatch:
    inputs:
      channel:
        description: EAS Update channel (matches build profile)
        required: true
        default: production
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v5

      - name: 🏗 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🚀 Publish update
        run: eas update --branch ${{ github.event.inputs.channel }} --non-interactive
