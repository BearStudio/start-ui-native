appId: com.bearstudio.startuinative
tags:
  - subflow
env:
  TEST_EMAIL: admin@admin.com
  TEST_OTP: '000000'
---
- launchApp
- openLink: exp://127.0.0.1:19000


# Complete app onboarding (2 screens)
- runFlow: ./complete-app-onboarding.yaml

# Sign in with test email
- tapOn:
    id: 'sign-in-email'
- inputText: ${TEST_EMAIL}
- tapOn:
    id: 'sign-in-submit'

# Enter OTP (auto-submits after 6 digits)
- tapOn:
    id: 'otp-input'
- inputText: ${TEST_OTP}

# Wait for home screen to load
- waitForAnimationToEnd
