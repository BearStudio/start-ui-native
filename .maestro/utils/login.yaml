appId: ${APP_ID}
---
- tapOn: 'Email'
- inputText: ${TEST_EMAIL}

- runFlow:
    when:
      visible: 'Continue with email'
    commands:
      - tapOn: 'Continue with email'
- runFlow:
    when:
      visible: 'Connexion avec email'
    commands:
      - tapOn: 'Connexion avec email'

- inputText: ${TEST_OTP}

- runFlow:
    when:
      visible: 'Home'
    commands:
      - assertVisible: 'Home'
- runFlow:
    when:
      visible: 'Accueil'
    commands:
      - assertVisible: 'Accueil'
