appId: com.bearstudio.startuinative.development
---
- tapOn: 'Email'
- inputText: 'user@user.com'

- runFlow:
    when:
      visible: 'Continue with email'
    commands:
      - tapOn: 'Continue with email'
- runFlow:
    when:
      visible: 'Connexion avec email'
    commands:
      - tapOn: 'Connexion avec email'

- inputText: '000000'

- runFlow:
    when:
      visible: 'Home'
    commands:
      - assertVisible: 'Home'
- runFlow:
    when:
      visible: 'Accueil'
    commands:
      - assertVisible: 'Accueil'
