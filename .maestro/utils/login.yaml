appId: com.bearstudio.startuinative.development
---
- tapOn:
    id: "signin-email-input"
- inputText: "user@user.com"
- tapOn:
    id: "signin-submit-button"

# OTP field is autofocused and auto-submits after 6 digits
- tapOn:
    id: "otp-code-input"
- inputText: "000000"

# Assert landing on home tab
- assertVisible:
    id: "tab-home"
