# Tests the books tab navigation and book detail screen.
# Run: maestro test .maestro/flows/books.yaml
#
# This flow starts from scratch (clearState) and includes auth.
appId: com.bearstudio.startuinative.development
---
- launchApp:
    clearState: true

- runFlow: ../utils/handle-onboarding.yaml
- runFlow: ../utils/login.yaml

- tapOn:
    id: "tab-books"

# Wait for the books list to load
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        id: "books-empty-state"
    file: ../utils/open-first-book.yaml
