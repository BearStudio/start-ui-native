# Tests the books tab navigation and book detail screen.
# Run: maestro test .maestro/flows/books.yaml
#
# appId variants:
#   dev:        com.bearstudio.startuinative.development
#   staging:    com.bearstudio.startuinative.staging
#   production: com.bearstudio.startuinative
appId: com.bearstudio.startuinative.development
---
- launchApp:
    clearState: true

- runFlow: ../utils/handle-onboarding.yaml
- runFlow: ../utils/login.yaml

- runFlow:
    when:
      visible: 'Books'
    commands:
      - tapOn: 'Books'
- runFlow:
    when:
      visible: 'Livres'
    commands:
      - tapOn: 'Livres'

- waitForAnimationToEnd

- runFlow:
    when:
      notVisible: 'There is no books'
    file: ../utils/open-first-book.yaml
