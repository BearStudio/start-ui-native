# Tests the logout flow from the account tab.
# Run: maestro test .maestro/flows/sign-out.yaml
appId: com.bearstudio.startuinative
---
- launchApp:
    clearState: true

- runFlow: ../utils/handle-onboarding.yaml
- runFlow: ../utils/login.yaml

- tapOn: 'Account'
- tapOn: 'Sign out'

- waitForAnimationToEnd

- runFlow:
    when:
      visible: 'You are about to end your session'
    commands:
      - tapOn:
          text: 'Sign out'
          below: 'You are about to end your session'

- waitForAnimationToEnd
- assertVisible: 'Login to your account'
