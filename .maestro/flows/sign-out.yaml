# Tests the logout flow from the account tab.
# Run: maestro test .maestro/flows/sign-out.yaml
#
# appId variants:
#   dev:        com.bearstudio.startuinative.development
#   staging:    com.bearstudio.startuinative.staging
#   production: com.bearstudio.startuinative
appId: com.bearstudio.startuinative.development
---
- launchApp:
    clearState: true

- runFlow: ../utils/handle-onboarding.yaml
- runFlow: ../utils/login.yaml

- runFlow:
    when:
      visible: 'Account'
    commands:
      - tapOn: 'Account'
- runFlow:
    when:
      visible: 'Compte'
    commands:
      - tapOn: 'Compte'

- runFlow:
    when:
      visible: 'Sign out'
    commands:
      - tapOn: 'Sign out'
- runFlow:
    when:
      visible: 'Déconnexion'
    commands:
      - tapOn: 'Déconnexion'

- runFlow:
    when:
      visible: 'Account Sign Out'
    commands:
      - tapOn: 'Sign out'
- runFlow:
    when:
      visible: 'Déconnexion du compte'
    commands:
      - tapOn: 'Déconnexion'

# Assert we are back on the sign-in screen
- runFlow:
    when:
      visible: 'Login to your account'
    commands:
      - assertVisible: 'Login to your account'
- runFlow:
    when:
      visible: 'Connexion à votre compte'
    commands:
      - assertVisible: 'Connexion à votre compte'
