# Tests navigation between the three main tabs.
# Run: maestro test .maestro/flows/tab-navigation.yaml
#
# appId variants:
#   dev:        com.bearstudio.startuinative.development
#   staging:    com.bearstudio.startuinative.staging
#   production: com.bearstudio.startuinative
appId: com.bearstudio.startuinative.development
---
- launchApp:
    clearState: true

- runFlow: ../utils/handle-onboarding.yaml
- runFlow: ../utils/login.yaml

- runFlow:
    when:
      visible: 'Home'
    commands:
      - assertVisible: 'Home'
- runFlow:
    when:
      visible: 'Accueil'
    commands:
      - assertVisible: 'Accueil'

- runFlow:
    when:
      visible: 'Books'
    commands:
      - tapOn: 'Books'
      - assertVisible: 'Books'
- runFlow:
    when:
      visible: 'Livres'
    commands:
      - tapOn: 'Livres'
      - assertVisible: 'Livres'

- runFlow:
    when:
      visible: 'Account'
    commands:
      - tapOn: 'Account'
      - assertVisible: 'Account'
- runFlow:
    when:
      visible: 'Compte'
    commands:
      - tapOn: 'Compte'
      - assertVisible: 'Compte'

- runFlow:
    when:
      visible: 'Home'
    commands:
      - tapOn: 'Home'
      - assertVisible: 'Home'
- runFlow:
    when:
      visible: 'Accueil'
    commands:
      - tapOn: 'Accueil'
      - assertVisible: 'Accueil'
